<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Train-tracker">
<meta name="theme-color" content="#0f172a">
<title>Train-tracker 💪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style id="theme-style">
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #f0f2f7; font-family: 'Nunito', system-ui, sans-serif; color: #0f172a; overflow: hidden; height: 100dvh; transition: background 0.2s, color 0.2s; }
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }
 
  .prog-bar { height: 10px; background: #e2e8f0; border-radius: 99px; overflow: hidden; margin: 10px 0; }
  .prog-fill { height: 100%; border-radius: 99px; transition: width 0.3s ease; }
  .prog-wrap { margin-bottom: 12px; }
  .prog-labels { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
 
  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .modal-sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 88dvh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 900; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; font-size: 22px; cursor: pointer; line-height: 1; }
  body.dark .modal-sheet { background: #1a1a2e; color: #e2e8f0; }
  body.dark .modal-input { background: #252540; border-color: #3a3a5c; color: #fff; }
  .modal-input { width: 100%; border-radius: 12px; padding: 11px 13px; font-size: 14px; border: 1.5px solid #e2e8f0; font-family: 'Nunito', sans-serif; font-weight: 600; outline: none; margin-bottom: 10px; }
  .modal-label { font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
  .modal-row { margin-bottom: 12px; }
  .modal-2col { display: flex; gap: 10px; }
  .modal-2col > * { flex: 1; }
  .muscle-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .muscle-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all 0.15s; }
  .muscle-chip.selected-primary { background: #0f172a; color: #fff; border-color: #0f172a; }
  .muscle-chip.selected-secondary { background: #2563eb22; color: #2563eb; border-color: #2563eb; }
  body.dark .muscle-chip { border-color: #3a3a5c; color: #cbd5e1; }
  body.dark .muscle-chip.selected-primary { background: #e2e8f0; color: #0f172a; }
  .routine-ex-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .routine-ex-row input, .routine-ex-row select { border-radius: 9px; border: 1.5px solid #e2e8f0; padding: 8px 10px; font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 600; background: #f8fafc; outline: none; }
  body.dark .routine-ex-row input, body.dark .routine-ex-row select { background: #252540; border-color: #3a3a5c; color: #fff; }
  .btn-modal-add { background: none; border: 1.5px dashed #2563eb; border-radius: 10px; color: #2563eb; font-size: 13px; padding: 9px; cursor: pointer; width: 100%; margin-top: 6px; font-weight: 700; font-family: 'Nunito', sans-serif; }
  .btn-modal-primary { width: 100%; background: #0f172a; color: #fff; border: none; border-radius: 13px; padding: 14px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 12px; font-family: 'Nunito', sans-serif; }
  .btn-modal-del { background: none; border: none; color: #dc2626; font-size: 18px; cursor: pointer; padding: 4px 8px; }
 
  /* CHART TOGGLE */
  .chart-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
  .chart-toggle-btn { flex: 1; padding: 6px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1.5px solid #e2e8f0; cursor: pointer; background: transparent; font-family: 'Nunito', sans-serif; transition: all 0.15s; }
  .chart-toggle-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }
  body.dark .chart-toggle-btn { border-color: #3a3a5c; color: #cbd5e1; }
  body.dark .chart-toggle-btn.active { background: #e2e8f0; color: #0f172a; }
 
  /* RUTINA HINT en ex-card */
  .routine-hint { font-size: 11px; font-weight: 700; color: #2563eb; background: #eff6ff; border-radius: 8px; padding: 5px 9px; margin-bottom: 8px; }
  body.dark .routine-hint { background: #1e3a5f; color: #93c5fd; }
 
  /* BANNER RACHA */
  .streak-banner { border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
  .streak-banner .streak-fire { font-size: 32px; line-height: 1; }
  .streak-banner .streak-text { flex: 1; }
  .streak-banner .streak-num { font-size: 22px; font-weight: 900; line-height: 1; }
  .streak-banner .streak-sub { font-size: 12px; font-weight: 700; opacity: 0.8; margin-top: 2px; }
 
  /* BANNER RUTINA DEL DÍA */
  .today-routine-banner { border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 1.5px solid #bfdbfe; cursor: pointer; }
  body.dark .today-routine-banner { background: linear-gradient(135deg, #1e3a5f, #1e3a8a); border-color: #3b82f6; }
  .today-routine-banner:active { opacity: 0.85; }
  .today-routine-banner .tr-icon { font-size: 28px; }
  .today-routine-banner .tr-text { flex: 1; }
  .today-routine-banner .tr-title { font-size: 13px; font-weight: 800; color: #1d4ed8; }
  body.dark .today-routine-banner .tr-title { color: #93c5fd; }
  .today-routine-banner .tr-sub { font-size: 11px; font-weight: 700; color: #3b82f6; margin-top: 2px; }
  .today-routine-banner .tr-arrow { font-size: 18px; color: #3b82f6; font-weight: 900; }
 
  /* TEMPLATE MODAL */
  .template-item { padding: 12px; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .template-item:hover, .template-item:active { border-color: #2563eb; background: #eff6ff; }
  body.dark .template-item { border-color: #3a3a5c; }
  body.dark .template-item:hover { border-color: #3b82f6; background: #1e3a5f; }
  .template-item .t-date { font-size: 13px; font-weight: 800; }
  .template-item .t-machines { font-size: 11px; font-weight: 600; color: #64748b; margin-top: 3px; }
  .template-item .t-pts { font-size: 12px; font-weight: 800; color: #2563eb; margin-top: 2px; }
 
  /* MACHINE HISTORY MODAL */
  .mh-table { width: 100%; border-collapse: collapse; font-size: 12px; font-weight: 700; margin-top: 8px; }
  .mh-table th { text-align: left; padding: 6px 4px; color: #64748b; font-size: 11px; border-bottom: 1.5px solid #e2e8f0; }
  .mh-table td { padding: 7px 4px; border-bottom: 1px solid #e2e8f022; }
  body.dark .mh-table th { border-bottom-color: #3a3a5c; }
  body.dark .mh-table td { border-bottom-color: #2e2e4a; }
  .mh-pr-row { background: #fefce8; }
  body.dark .mh-pr-row { background: #2a2a10; }

  /* ===== STATS MONTHLY COMPARISON ===== */
  .month-compare-card {
    border: 1.5px solid #e2e8f0;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    background: #fff;
  }
  body.dark .month-compare-card { background: #1a1a2e; border-color: #2e2e4a; }
  .month-compare-title {
    font-size: 13px; font-weight: 900; margin-bottom: 14px;
    display: flex; align-items: center; gap: 7px;
  }
  .mc-month-label {
    font-size: 10px; font-weight: 800; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1.5px solid #e2e8f0;
    display: flex; justify-content: space-between;
  }
  body.dark .mc-month-label { border-bottom-color: #2e2e4a; color: #8b9ab5; }
  .mc-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid #f1f5f9;
    gap: 8px;
  }
  body.dark .mc-row { border-bottom-color: #1e1e30; }
  .mc-row:last-child { border-bottom: none; }
  .mc-label { font-size: 11px; font-weight: 700; color: #64748b; flex: 1; min-width: 0; }
  body.dark .mc-label { color: #8b9ab5; }
  .mc-vals { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .mc-val-this { font-size: 13px; font-weight: 900; }
  .mc-val-prev { font-size: 11px; font-weight: 700; color: #94a3b8; }
  .mc-delta {
    font-size: 10px; font-weight: 800;
    padding: 2px 7px; border-radius: 20px; min-width: 40px; text-align: center;
  }
  .mc-delta.up { background: #dcfce7; color: #16a34a; }
  .mc-delta.down { background: #fee2e2; color: #dc2626; }
  .mc-delta.neutral { background: #f1f5f9; color: #64748b; }
  body.dark .mc-delta.up { background: #14532d; color: #86efac; }
  body.dark .mc-delta.down { background: #450a0a; color: #fca5a5; }
  body.dark .mc-delta.neutral { background: #252540; color: #94a3b8; }
  .mc-sessions-row {
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  body.dark .mc-sessions-row { background: linear-gradient(135deg, #1e3a5f22, #1e3a8a22); border: 1px solid #2e3f6e; }
  .mc-sessions-num { font-size: 26px; font-weight: 900; color: #1d4ed8; }
  body.dark .mc-sessions-num { color: #93c5fd; }
  .mc-sessions-label { font-size: 11px; font-weight: 700; color: #3b82f6; }

  /* ===== AI ROUTINE SUGGESTER ===== */
  .ai-suggest-card {
    border: 1.5px solid #e2e8f0;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    background: #fff;
  }
  body.dark .ai-suggest-card { background: #1a1a2e; border-color: #2e2e4a; }
  .ai-suggest-title {
    font-size: 13px; font-weight: 900; margin-bottom: 14px;
    display: flex; align-items: center; gap: 7px;
  }
  .muscle-priority-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
  }
  .muscle-priority-item {
    border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 10px;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  body.dark .muscle-priority-item { border-color: #3a3a5c; }
  .muscle-priority-item.prio-high { background: #0f172a; color: #fff; border-color: #0f172a; }
  .muscle-priority-item.prio-med { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }
  .muscle-priority-item.prio-low { background: #f0fdf4; color: #16a34a; border-color: #86efac; }
  body.dark .muscle-priority-item.prio-high { background: #e2e8f0; color: #0f172a; border-color: #e2e8f0; }
  body.dark .muscle-priority-item.prio-med { background: #1e3a5f; color: #93c5fd; border-color: #3b82f6; }
  body.dark .muscle-priority-item.prio-low { background: #14532d; color: #86efac; border-color: #166534; }
  .muscle-priority-item .mp-name { font-size: 12px; font-weight: 800; }
  .muscle-priority-item .mp-prio { font-size: 10px; font-weight: 700; opacity: 0.8; margin-top: 3px; }
  .goal-selector { display: flex; gap: 8px; margin-bottom: 14px; }
  .goal-option {
    flex: 1; padding: 9px 6px; border-radius: 11px; border: 1.5px solid #e2e8f0;
    text-align: center; cursor: pointer; font-size: 11px; font-weight: 700;
    transition: all 0.15s;
  }
  body.dark .goal-option { border-color: #3a3a5c; }
  .goal-option.selected { background: #0f172a; color: #fff; border-color: #0f172a; }
  body.dark .goal-option.selected { background: #e2e8f0; color: #0f172a; }
  .btn-generate {
    width: 100%; background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff; border: none; border-radius: 13px; padding: 13px;
    font-size: 14px; font-weight: 800; cursor: pointer; margin-bottom: 12px;
    font-family: 'Nunito', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-generate:active { opacity: 0.9; }
  .ai-result-card {
    background: #f8fafc; border-radius: 14px; padding: 14px; margin-top: 4px;
    border: 1.5px solid #e2e8f0;
  }
  body.dark .ai-result-card { background: #12121f; border-color: #2e2e4a; }
  .ai-result-title { font-size: 12px; font-weight: 900; margin-bottom: 10px; color: #2563eb; }
  .ai-ex-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid #e2e8f044;
  }
  .ai-ex-row:last-child { border-bottom: none; }
  .ai-ex-icon { font-size: 18px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
  .ai-ex-name { font-size: 13px; font-weight: 800; }
  .ai-ex-detail { font-size: 11px; font-weight: 700; color: #2563eb; margin-top: 2px; }
  .ai-ex-note { font-size: 10px; font-weight: 600; color: #64748b; margin-top: 3px; }
  .ai-loading {
    text-align: center; padding: 20px; font-size: 13px; font-weight: 700;
    color: #64748b; display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .ai-spinner {
    width: 28px; height: 28px; border: 3px solid #e2e8f0;
    border-top-color: #2563eb; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-use-suggestion {
    width: 100%; background: #0f172a; color: #fff; border: none;
    border-radius: 12px; padding: 12px; font-size: 13px; font-weight: 800;
    cursor: pointer; margin-top: 12px; font-family: 'Nunito', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  body.dark .btn-use-suggestion { background: #e2e8f0; color: #0f172a; }

  /* ===== BOTÓN COMPARTIR ===== */
  .btn-share-card {
    background: #dcfce7; border: none; border-radius: 10px;
    padding: 10px; font-weight: 700; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    color: #15803d;
  }
  body.dark .btn-share-card { background: #14532d; color: #86efac; }

  /* ===== CRONÓMETRO ===== */
  .chrono-box {
    background: #f1f5f9; border-radius: 16px; padding: 12px;
    margin-bottom: 14px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  body.dark .chrono-box { background: #252540; }
  .chrono-display {
    font-size: 28px; font-weight: 900; font-family: monospace;
    letter-spacing: 2px; background: #0f172a; color: #fff;
    padding: 6px 16px; border-radius: 40px; display: inline-block;
  }
  body.dark .chrono-display { background: #0a0a0f; color: #e2e8f0; }
  .chrono-buttons { display: flex; gap: 10px; }
  .chrono-btn {
    background: #0f172a; color: #fff; border: none;
    border-radius: 40px; padding: 8px 18px; font-weight: 700;
    cursor: pointer; font-family: 'Nunito', sans-serif;
  }
  body.dark .chrono-btn { background: #e2e8f0; color: #0f172a; }
  .chrono-btn.reset { background: #dc2626; color: #fff; }
  body.dark .chrono-btn.reset { background: #dc2626; color: #fff; }

  /* ===== FECHA INPUT ===== */
  input[type="date"].form-input {
    display: block;
    width: 100%;
    min-height: 46px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    line-height: 1.4;
    -webkit-appearance: none;
    appearance: none;
    box-sizing: border-box;
  }

  /* ===== COSTE GYM CARD ===== */
  .gym-cost-card {
    border: 1.5px solid #fde68a;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    background: linear-gradient(135deg, #fefce8, #fef9c3);
  }
  body.dark .gym-cost-card {
    background: linear-gradient(135deg, #1c1800, #27200a);
    border-color: #92400e;
  }
  .gym-cost-title {
    font-size: 13px; font-weight: 900; margin-bottom: 14px;
    display: flex; align-items: center; gap: 7px; color: #78350f;
  }
  body.dark .gym-cost-title { color: #fcd34d; }
  .gym-cost-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px;
  }
  .gym-cost-stat {
    background: rgba(255,255,255,0.7); border-radius: 12px; padding: 10px 8px;
    text-align: center; border: 1px solid #fde68a;
  }
  body.dark .gym-cost-stat { background: rgba(255,255,255,0.07); border-color: #92400e44; }
  .gym-cost-val { font-size: 18px; font-weight: 900; color: #92400e; }
  body.dark .gym-cost-val { color: #fcd34d; }
  .gym-cost-lbl { font-size: 10px; font-weight: 700; color: #78350f; margin-top: 3px; }
  body.dark .gym-cost-lbl { color: #fbbf24; }
  .gym-cost-motivator {
    background: rgba(255,255,255,0.6); border-radius: 10px; padding: 10px 12px;
    font-size: 12px; font-weight: 700; color: #78350f; text-align: center;
    border: 1px solid #fde68a;
  }
  body.dark .gym-cost-motivator { background: rgba(0,0,0,0.2); color: #fcd34d; border-color: #92400e44; }

  /* ===== PERFIL ===== */
  .profile-card {
    border: 1.5px solid #e2e8f0;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    background: #fff;
    cursor: pointer;
    transition: all 0.15s;
  }
  body.dark .profile-card { background: #1a1a2e; border-color: #2e2e4a; }
  .profile-card:active { opacity: 0.85; }
  .profile-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .profile-avatar {
    font-size: 32px;
    background: #0f172a;
    color: #fff;
    width: 52px;
    height: 52px;
    border-radius: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body.dark .profile-avatar { background: #e2e8f0; color: #0f172a; }
  .profile-info {
    flex: 1;
  }
  .profile-name {
    font-size: 16px;
    font-weight: 900;
  }
  .profile-badge {
    font-size: 10px;
    font-weight: 700;
    color: #64748b;
    margin-top: 2px;
  }
  .profile-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #e2e8f0;
  }
  body.dark .profile-stats { border-top-color: #2e2e4a; }
  .profile-stat-item {
    text-align: center;
  }
  .profile-stat-value {
    font-size: 18px;
    font-weight: 900;
  }
  .profile-stat-label {
    font-size: 10px;
    font-weight: 700;
    color: #64748b;
    margin-top: 2px;
  }
  .profile-routine {
    margin-top: 10px;
    padding: 8px 10px;
    background: #f1f5f9;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    color: #2563eb;
    text-align: center;
  }
  body.dark .profile-routine { background: #252540; color: #93c5fd; }

  /* ===== TEMPORIZADOR DESCANSO ===== */
  .rest-timer-bar {
    height: 5px; background: #e2e8f0; border-radius: 99px;
    overflow: hidden; margin: 8px 0 4px;
  }
  .rest-timer-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #c8f135, #2563eb);
    transition: width 1s linear;
  }
  .rest-timer-btn {
    background: #0f172a; color: #fff; border: none;
    border-radius: 8px; padding: 7px 14px; font-weight: 700;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    font-size: 12px; margin-top: 6px; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  body.dark .rest-timer-btn { background: #e2e8f0; color: #0f172a; }
  .rest-timer-btn.running { background: #dc2626; }
  .rest-timer-display {

function loadUserProfile() {
  try {
    const saved = JSON.parse(localStorage.getItem("gym_user_profile") || "{}");
    userProfile = { ...userProfile, ...saved };
    // Si no tiene fecha de inicio de ciclo, la ponemos hoy
    if (!userProfile.trainingCycle?.startDate) {
      userProfile.trainingCycle = {
        startDate: new Date().toISOString().slice(0, 10),
        currentWeek: 1,
        phase: "adaptation"
      };
      saveUserProfile();
    }
  } catch(e) {}
}

function saveUserProfile() {
  localStorage.setItem("gym_user_profile", JSON.stringify(userProfile));
}

function getLastWeight() {
  if(!weightEntries.length) return null;
  const sorted = [...weightEntries].sort((a,b) => b.date.localeCompare(a.date));
  return sorted[0].weight;
}

function calculateBMI(weightKg, heightCm) {
  if(!weightKg || !heightCm || heightCm <= 0) return null;
  const heightM = heightCm / 100;
  const bmi = weightKg / (heightM * heightM);
  return Math.round(bmi * 10) / 10;
}

function getCurrentRoutineName() {
  if(!userProfile.currentRoutineId) return "Ninguna";
  const routine = routines.find(r => r.id == userProfile.currentRoutineId);
  return routine ? routine.name : "Ninguna";
}

// ==================== CRONÓMETRO ====================
let chronoInterval = null;

function chronoGetElapsed(){
  const startTs = localStorage.getItem("chrono_start_ts");
  const pausedSecs = parseInt(localStorage.getItem("chrono_paused_secs") || "0");
  const active = localStorage.getItem("chrono_active") === "1";
  if(active && startTs){
    return Math.floor((Date.now() - parseInt(startTs)) / 1000) + pausedSecs;
  }
  return pausedSecs;
}

function chronoIsActive(){
  return localStorage.getItem("chrono_active") === "1";
}

function chronoFormat(secs){
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function startChrono(){
  if(chronoIsActive()) return;
  const pausedSecs = parseInt(localStorage.getItem("chrono_paused_secs") || "0");
  localStorage.setItem("chrono_start_ts", String(Date.now() - pausedSecs * 1000));
  localStorage.setItem("chrono_active", "1");
  _startChronoInterval();
}

function stopChrono(){
  if(!chronoIsActive()) return;
  const elapsed = chronoGetElapsed();
  localStorage.setItem("chrono_paused_secs", String(elapsed));
  localStorage.removeItem("chrono_start_ts");
  localStorage.setItem("chrono_active", "0");
  if(chronoInterval){ clearInterval(chronoInterval); chronoInterval = null; }
  _updateChronoDisplay();
}

function resetChrono(){
  localStorage.removeItem("chrono_start_ts");
  localStorage.setItem("chrono_paused_secs", "0");
  localStorage.setItem("chrono_active", "0");
  if(chronoInterval){ clearInterval(chronoInterval); chronoInterval = null; }
  const el = document.getElementById('chrono-display');
  if(el) el.textContent = '00:00';
  const dur = document.getElementById('f-dur');
  if(dur){ dur.value = 0; dur.dispatchEvent(new Event('input')); }
}

function _updateChronoDisplay(){
  const secs = chronoGetElapsed();
  const el = document.getElementById('chrono-display');
  if(el) el.textContent = chronoFormat(secs);
  const dur = document.getElementById('f-dur');
  if(dur){ dur.value = Math.floor(secs / 60); dur.dispatchEvent(new Event('input')); }
}

function _startChronoInterval(){
  if(chronoInterval) clearInterval(chronoInterval);
  chronoInterval = setInterval(_updateChronoDisplay, 1000);
}

function resumeChronoIfActive(){
  if(chronoIsActive()){
    _startChronoInterval();
  }
}

// ==================== TEMPORIZADOR DESCANSO SERIES (por máquina) ====================
let restTimerInterval = null;
let restTimerSeconds = 0;
let restTimerActiveIdx = null;
const REST_DURATION = 90;

function startRestTimerFor(exIdx) {
  // Si hay un timer activo en otro ejercicio, cancélalo
  if (restTimerInterval) {
    clearInterval(restTimerInterval);
    restTimerInterval = null;
    // Resetea el UI del anterior
    if (restTimerActiveIdx !== null) resetRestTimerUI(restTimerActiveIdx);
  }
  // Si pulsas el mismo que ya estaba activo, simplemente lo cancela (ya se limpió arriba)
  if (restTimerActiveIdx === exIdx && restTimerSeconds === 0) {
    restTimerActiveIdx = null;
    return;
  }
  restTimerActiveIdx = exIdx;
  restTimerSeconds = REST_DURATION;
  updateRestTimerUIFor(exIdx, restTimerSeconds);

  const btn = document.getElementById(`rest-timer-btn-${exIdx}`);
  if (btn) { btn.innerHTML = "⏹ Cancelar"; btn.classList.add("running"); }

  restTimerInterval = setInterval(() => {
    restTimerSeconds--;
    updateRestTimerUIFor(exIdx, restTimerSeconds);
    if (restTimerSeconds <= 0) {
      clearInterval(restTimerInterval);
      restTimerInterval = null;
      restTimerActiveIdx = null;
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = "sine"; osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.8);
      } catch(e) {}
      showToast("✅ ¡Descansado! Siguiente serie.");
      const btn2 = document.getElementById(`rest-timer-btn-${exIdx}`);
      if (btn2) { btn2.innerHTML = "⏱ Descanso 90s"; btn2.classList.remove("running"); }
      resetRestTimerUI(exIdx);
    }
  }, 1000);
}

function updateRestTimerUIFor(exIdx, secs) {
  const fill = document.getElementById(`rest-timer-fill-${exIdx}`);
  const btn = document.getElementById(`rest-timer-btn-${exIdx}`);
  const pct = (secs / REST_DURATION) * 100;
  if (fill) fill.style.width = pct + "%";
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  const timeStr = `${m}:${s.toString().padStart(2, "0")}`;
  if (btn && secs > 0) btn.innerHTML = `⏹ ${timeStr} — Cancelar`;
}

function resetRestTimerUI(exIdx) {
  const fill = document.getElementById(`rest-timer-fill-${exIdx}`);
  const btn = document.getElementById(`rest-timer-btn-${exIdx}`);
  if (fill) fill.style.width = "100%";
  if (btn) { btn.innerHTML = "⏱ Descanso 90s"; btn.classList.remove("running"); }
}

// ==================== TRACKER CALÓRICO ====================
function loadCalorieLog() {
  try { return JSON.parse(localStorage.getItem("gym_calorie_log") || "{}"); }
  catch(e) { return {}; }
}

function saveCalorieEntry(date, kcal) {
  const log = loadCalorieLog();
  log[date] = parseFloat(kcal);
  localStorage.setItem("gym_calorie_log", JSON.stringify(log));
}

function getCalorieGoal() {
  return parseFloat(localStorage.getItem("gym_calorie_goal") || "2800");
}

function saveCalorieGoal(val) {
  localStorage.setItem("gym_calorie_goal", String(parseFloat(val)));
}

function saveCalorieFromForm() {
  const kcalInput = document.getElementById("cal-kcal-input");
  const dateInput = document.getElementById("cal-date-input");
  const kcal = parseFloat(kcalInput?.value);
  const date = dateInput?.value || new Date().toISOString().slice(0, 10);
  if (isNaN(kcal) || kcal < 0 || kcal > 15000) { showToast("Introduce unas kcal válidas", true); return; }
  saveCalorieEntry(date, kcal);
  render();
  showToast("✅ Calorías guardadas");
}

function saveCalorieGoalFromForm() {
  const val = parseFloat(document.getElementById("cal-goal-input")?.value);
  if (isNaN(val) || val < 500 || val > 15000) { showToast("Objetivo entre 500 y 15000 kcal", true); return; }
  saveCalorieGoal(val);
  render();
  showToast(`🎯 Objetivo calórico: ${val} kcal`);
}

    const d = new Date();

    const maxDisplay = goal * 1.3;

// ==================== MEDIA GLOBAL POR MÁQUINA ====================
function getMachineAverageStats(machineName) {
  let totalSets = 0;
  let totalReps = 0;
  let totalWeight = 0;
  let sessionCount = 0;
  
  sessions.forEach(sess => {
    const ex = sess.exercises.find(e => e.machine === machineName);
    if(!ex) return;
    
    const validSets = ex.sets.filter(s => !s.isCardio && (parseFloat(s.weight)||0) > 0 && (parseFloat(s.reps)||0) > 0);
    if(validSets.length === 0) return;
    
    sessionCount++;
    totalSets += validSets.length;
    
    validSets.forEach(set => {
      const reps = parseFloat(set.reps) || 0;
      const weight = parseFloat(set.weight) || 0;
      totalReps += reps;
      totalWeight += weight;
    });
  });
  
  if(sessionCount === 0) return null;
  
  const avgSets = Math.round((totalSets / sessionCount) * 10) / 10;
  const avgReps = Math.round(totalReps / totalSets);
  const avgWeight = Math.round((totalWeight / totalSets) * 10) / 10;
  
  return { avgSets, avgReps, avgWeight, sessionCount };
}

function getSessionTotals(session) {
  let totalSets = 0;
  let totalReps = 0;
  let totalVolumeKg = 0;
  
  session.exercises.forEach(ex => {
    ex.sets.forEach(set => {
      if(set.isCardio) return;
      const weight = parseFloat(set.weight) || 0;
      const reps = parseFloat(set.reps) || 0;
      if(weight > 0 && reps > 0) {
        totalSets++;
        totalReps += reps;
        totalVolumeKg += weight * reps;
      }
    });
  });
  
  return { totalSets, totalReps, totalVolumeKg: Math.round(totalVolumeKg) };
}

// ==================== VOLUMEN SEMANAL ====================
function getWeeklyVolumeByMuscle() {
  const currentWeek = weekStart(new Date().toISOString().slice(0,10));
  const weekSessions = sessions.filter(s => weekStart(s.date) === currentWeek);

  const seriesByMuscle = {
    "Pecho": 0, "Espalda": 0, "Hombro": 0,
    "Brazos": 0, "Piernas": 0, "Core": 0, "Cardio": 0
  };

  weekSessions.forEach(sess => {
    sess.exercises.forEach(ex => {
      const custom = customMachines.find(m => m.name === ex.machine);
      const group = custom?.muscleMain || MUSCLE_GROUPS[ex.machine] || null;
      if(!group || !seriesByMuscle.hasOwnProperty(group)) return;

      const validSets = ex.sets.filter(s =>
        s.isCardio
          ? (parseFloat(fixDecimal(s.value))||0) > 0
          : (parseFloat(fixDecimal(s.weight))||0) > 0
      );
      seriesByMuscle[group] += validSets.length;
    });
  });

  return seriesByMuscle;
}

function getMuscleBalanceAlerts() {
  const vol = getWeeklyVolumeByMuscle();
  const alerts = [];

  const pairs = [
    { a: "Pecho", b: "Espalda", label: "Pecho/Espalda" },
    { a: "Hombro", b: "Espalda", label: "Hombro/Espalda" }
  ];

  pairs.forEach(({ a, b }) => {
    const va = vol[a] || 0;
    const vb = vol[b] || 0;
    if (va === 0 && vb === 0) return;
    const ratio = vb > 0 ? va / vb : 99;
    if (ratio > 1.5) alerts.push({ type: "warning", msg: `⚠️ ${a} dobla en volumen a ${b} (${va} vs ${vb} series) — riesgo de desequilibrio postural` });
    else if (ratio < 0.5 && va > 0) alerts.push({ type: "info", msg: `💡 ${b} tiene mucho más volumen que ${a} (${vb} vs ${va} series)` });
  });

  // Brazos sin trabajo de empuje/tirón
  if ((vol["Brazos"] || 0) > 0 && (vol["Pecho"] || 0) === 0 && (vol["Espalda"] || 0) === 0) {
    alerts.push({ type: "warning", msg: "⚠️ Trabajas brazos sin empuje ni tirón — poco transferible a fuerza real" });
  }

  return alerts;
}

// ==================== PROGRESIÓN AUTOMÁTICA ====================
function getProgressionTarget(machineName) {
  const sorted = [...sessions].sort((a,b) => b.date.localeCompare(a.date));
  let lastSession = null;
  for(const sess of sorted) {
    const ex = sess.exercises.find(e => e.machine === machineName);
    if(ex && ex.sets.some(s => !s.isCardio && (parseFloat(s.weight)||0) > 0)) {
      lastSession = { date: sess.date, exercise: ex };
      break;
    }
  }
  if(!lastSession) return null;

  const sets = lastSession.exercise.sets.filter(s => !s.isCardio && (parseFloat(s.weight)||0) > 0);
  if(!sets.length) return null;

  const weights = sets.map(s => parseFloat(s.weight)||0);
  const repsArr = sets.map(s => parseFloat(s.reps)||0);
  const maxWeight = Math.max(...weights);
  const avgReps = Math.round(repsArr.reduce((a,b)=>a+b,0) / repsArr.length);
  const numSets = sets.length;

  const HYPERTROPHY_MIN_REPS = 8;
  const HYPERTROPHY_MAX_REPS = 12;
  const WEIGHT_INCREMENT = 2.5;

  let targetWeight = maxWeight;
  let targetReps = avgReps;
  let advice = "";

  if(avgReps >= HYPERTROPHY_MAX_REPS) {
    targetWeight = maxWeight + WEIGHT_INCREMENT;
    targetReps = HYPERTROPHY_MIN_REPS;
    advice = `✅ Llegaste a ${HYPERTROPHY_MAX_REPS} reps — sube a ${targetWeight}kg`;
  } else {
    targetReps = Math.min(avgReps + 1, HYPERTROPHY_MAX_REPS);
    advice = `📈 Mismos ${maxWeight}kg — intenta ${targetReps} reps (antes ${avgReps})`;
  }

  return {
    targetWeight,
    targetReps,
    targetSets: numSets,
    lastDate: lastSession.date,
    lastWeight: maxWeight,
    lastReps: avgReps,
    advice
  };
}

// ==================== 1RM ====================
function calc1RM(weight, reps) {
  if (!weight || !reps || reps <= 0) return null;
  if (reps === 1) return weight;
  // Fórmula de Epley
  return Math.round(weight * (1 + reps / 30) * 10) / 10;
}

function getBest1RM(machineName) {
  let best = 0;
  sessions.forEach(sess => {
    const ex = sess.exercises.find(e => e.machine === machineName);
    if (!ex) return;
    ex.sets.forEach(s => {
      if (s.isCardio) return;
      const w = parseFloat(fixDecimal(s.weight)) || 0;
      const r = parseFloat(fixDecimal(s.reps)) || 0;
      const rm = calc1RM(w, r);
      if (rm && rm > best) best = rm;
    });
  });
  return best > 0 ? best : null;
}

function checkAndShowTip(context, data) {
  const shownKey = `tip_shown_${context}_${new Date().toISOString().slice(0,10)}`;
  if(localStorage.getItem(shownKey)) return;

  let tipText = null;
  if(context === "save_session") {
    const sc = data.score;
    const avg = getAverageScore();
    if(sc > avg * 1.1) tipText = EDU_TIPS.good_session;
    const pectEx = data.session.exercises.find(e => e.machine === "Pectoral");
    const pectEmpty = !pectEx || !pectEx.sets.some(s => (parseFloat(s.weight)||0) > 0);
    if(pectEmpty) tipText = EDU_TIPS.pectoral_empty;
    const shoulderEx = data.session.exercises.find(e => e.machine === "Shoulder Press");
    if(shoulderEx) {
      const repsArr = shoulderEx.sets.filter(s=>(parseFloat(s.reps)||0)>0).map(s=>parseFloat(s.reps)||0);
      const avgReps = repsArr.length ? repsArr.reduce((a,b)=>a+b,0)/repsArr.length : 0;
      if(avgReps > 0 && avgReps < 7) tipText = EDU_TIPS.shoulder_low_reps;
    }
  }

  if(tipText) {
    localStorage.setItem(shownKey, "1");
    setTimeout(() => showToast(tipText), 1500);
  }
}

function showToast(msg,isError=false){ const t=document.getElementById("toast"); t.textContent=msg; t.style.background=isError?"#dc2626":"#0f172a"; t.style.color="white"; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3000); }
function closeModal(){ document.getElementById("modal-container").innerHTML=""; }
function roundPt(n){ return Math.round(n*10)/10; }
function fixDecimal(val){ if(typeof val==='string') return val.replace(',','.'); return val; }
function calcScore(sets){ return sets.reduce((t,s)=>{ if(s.isCardio){ const v=parseFloat(fixDecimal(s.value))||0; return t+v*5; } const w=parseFloat(fixDecimal(s.weight))||0; const r=parseFloat(fixDecimal(s.reps))||0; return t+w*r; },0); }
function sessionScore(sess){ return sess.exercises.reduce((a,ex)=>a+calcScore(ex.sets),0); }
function getTotalPoints(){ return sessions.reduce((a,s)=>a+sessionScore(s),0); }
function getAverageScore(){ return sessions.length?getTotalPoints()/sessions.length:300; }
function getMaxScore(){ return sessions.length?Math.max(...sessions.map(sessionScore)):0; }
function getLastSessionScore(){ return sessions.length?sessionScore([...sessions].sort((a,b)=>b.date.localeCompare(a.date))[0]):0; }
function scoreColor(score,goal){ const p=goal>0?score/goal:0; return p>=1?"#16a34a":p>=0.6?"#d97706":"#2563eb"; }
function badgeHtml(score,goal){ const c=scoreColor(score,goal); return `<span class="badge" style="background:${c}18;color:${c}">${roundPt(score)} pts</span>`; }
function getEffortColor(level){ if(level<=4) return{bg:"#fee2e2",color:"#dc2626"}; if(level<=7) return{bg:"#fef3c7",color:"#d97706"}; return{bg:"#dcfce7",color:"#16a34a"}; }
function weekStart(dateStr){ const d=new Date(dateStr+"T12:00:00"); const day=d.getDay(); const diff=(day===0)?-6:1-day; d.setDate(d.getDate()+diff); return d.toISOString().slice(0,10); }

function getPRCardioKm(){
  let maxKm = 0;
  sessions.forEach(s=>{
    s.exercises.forEach(ex=>{
      if(ex.machine==="Cardio"){
        ex.sets.forEach(set=>{
          if(set.isCardio && set.unit==="km"){
            const km = parseFloat(fixDecimal(set.value)) || 0;
            if(km > maxKm) maxKm = km;
          }
        });
      }
    });
  });
  return maxKm > 0 ? `${maxKm} km` : "—";
}

function getWeekStreak(){
  if(!sessions.length) return { streak: 0, isActive: false };
  const weekDays = {};
  sessions.forEach(s => {
    const w = weekStart(s.date);
    if(!weekDays[w]) weekDays[w] = new Set();
    weekDays[w].add(s.date);
  });
  const currentWeek = weekStart(new Date().toISOString().slice(0,10));
  const prevWeek = (() => { const d = new Date(currentWeek+"T12:00:00"); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); })();
  const currentWeekDays = (weekDays[currentWeek]||new Set()).size;
  const startFrom = currentWeekDays >= 3 ? currentWeek : prevWeek;
  let streak = 0;
  let pointer = startFrom;
  const isActive = currentWeekDays >= 3 || (weekDays[prevWeek]||new Set()).size >= 3;
  for(let i = 0; i < 52; i++){
    const days = (weekDays[pointer]||new Set()).size;
    if(days >= 3){
      streak++;
      const d = new Date(pointer+"T12:00:00");
      d.setDate(d.getDate()-7);
      pointer = d.toISOString().slice(0,10);
    } else { break; }
  }
  return { streak, isActive, currentWeekDays };
}

function getTodayRoutine(){
  if(!routines.length) return null;
  const today = new Date();
  const dayName = DAYS_ES[today.getDay()];
  const dayShort = DAYS_SHORT[today.getDay()];
  const routine = routines.find(r => {
    if(!r.assignedDays || !r.assignedDays.length) return false;
    return r.assignedDays.some(d => {
      const dl = d.toLowerCase().trim();
      return dl === dayName || dl === dayShort.toLowerCase() || dayName.startsWith(dl) || dl.startsWith(dayName.slice(0,3));
    });
  });
  return routine || null;
}

function getMachineHistory(machineName){
  const history = [];
  [...sessions].sort((a,b) => a.date.localeCompare(b.date)).forEach(sess => {
    const ex = sess.exercises.find(e => e.machine === machineName);
    if(!ex || !ex.sets.length) return;
    const validSets = ex.sets.filter(s => !s.isCardio && (parseFloat(fixDecimal(s.weight))||0) > 0);
    if(!validSets.length) return;
    const maxWeight = Math.max(...validSets.map(s => parseFloat(fixDecimal(s.weight))||0));
    const bestSet = validSets.find(s => parseFloat(fixDecimal(s.weight)) === maxWeight);
    const totalScore = roundPt(calcScore(ex.sets));
    history.push({ date: sess.date, maxWeight, reps: parseFloat(fixDecimal(bestSet.reps))||0, sets: validSets.length, totalScore });
  });
  return history;
}

function getPRForMachine(machine){
  if(machine === "Cardio"){
    const km = getPRCardioKm();
    if(km !== "—") return { weight: parseFloat(km), reps: 1, score: parseFloat(km)*5 };
    return null;
  }
  let bestWeight=0, bestReps=0, bestScore=0;
  sessions.forEach(sess=>{
    const ex=sess.exercises.find(e=>e.machine===machine);
    if(!ex) return;
    ex.sets.forEach(s=>{
      if(s.isCardio) return;
      const w=parseFloat(fixDecimal(s.weight))||0;
      const r=parseFloat(fixDecimal(s.reps))||0;
      const sc=w*r;
      if(w>bestWeight||(w===bestWeight&&r>bestReps)){ bestWeight=w; bestReps=r; bestScore=sc; }
    });
  });
  return bestWeight>0?{weight:bestWeight,reps:bestReps,score:roundPt(bestScore)}:null;
}

function getPersonalRecords(){ const records={}; MACHINES.forEach(m=>records[m]=0); sessions.forEach(sess=>{ sess.exercises.forEach(ex=>{ const score=calcScore(ex.sets); if(score>records[ex.machine]) records[ex.machine]=roundPt(score); }); }); return records; }

function getCurrentMonthStats(){ const now=new Date(); const year=now.getFullYear(); const month=now.getMonth(); const ms=sessions.filter(s=>{ const d=new Date(s.date); return d.getFullYear()===year&&d.getMonth()===month; }); const sc=ms.length; const tp=ms.reduce((a,s)=>a+sessionScore(s),0); const ap=sc?tp/sc:0; const tm=ms.reduce((a,s)=>a+(parseFloat(s.duration)||0),0); const cp=sc?(GYM_PRICE/sc).toFixed(2):0; return{sessionCount:sc,totalPoints:tp,avgPoints:ap,totalMinutes:tm,costPerSession:cp}; }

function getPushPullRatio() {
  const twoWeeksAgo = new Date();
  twoWeeksAgo.setDate(twoWeeksAgo.getDate() - 14);
  const cutoff = twoWeeksAgo.toISOString().slice(0, 10);
  const recent = sessions.filter(s => s.date >= cutoff);

  let pushSets = 0, pullSets = 0;
  recent.forEach(sess => {
    sess.exercises.forEach(ex => {
      const db = MACHINE_DATABASE[ex.machine];
      if (!db) return;
      const validSets = ex.sets.filter(s =>
        !s.isCardio && (parseFloat(fixDecimal(s.weight)) || 0) > 0
      ).length;
      if (db.type === "empuje") pushSets += validSets;
      if (db.type === "tiron") pullSets += validSets;
    });
  });

  return {
    push: pushSets,
    pull: pullSets,
    ratio: pushSets > 0 ? roundPt(pullSets / pushSets) : null,
    target: userProfile.pushPullRatioTarget || 2,
    status: pullSets === 0 && pushSets === 0
      ? "sin_datos"
      : (pullSets / Math.max(pushSets, 1)) >= (userProfile.pushPullRatioTarget || 2) - 0.3
        ? "ok" : "warning"
  };
}

function getMuscleDebt() {
  const today = new Date().toISOString().slice(0, 10);
  const muscleLastSeen = {};

  [...sessions].sort((a, b) => a.date.localeCompare(b.date)).forEach(sess => {
    sess.exercises.forEach(ex => {
      const db = MACHINE_DATABASE[ex.machine];
      if (!db) return;
      const hasData = ex.sets.some(s =>
        !s.isCardio && (parseFloat(fixDecimal(s.weight)) || 0) > 0
      );
      if (!hasData) return;
      [...db.primaryMuscles, ...db.secondaryMuscles].forEach(m => {
        muscleLastSeen[m] = sess.date;
      });
    });
  });

  const debt = {};
  const keyMuscles = [
    "dorsal_ancho", "romboides", "trapecio_medio",
    "pectoral_mayor", "deltoides_anterior", "deltoides_lateral",
    "biceps", "triceps"
  ];
  keyMuscles.forEach(m => {
    if (!muscleLastSeen[m]) {
      debt[m] = 999;
    } else {
      const last = new Date(muscleLastSeen[m] + "T12:00:00");
      const now = new Date(today + "T12:00:00");
      debt[m] = Math.floor((now - last) / (1000 * 60 * 60 * 24));
    }
  });

  return debt;
}

function getCyclePhase() {
  if (!userProfile.trainingCycle?.startDate) {
    return { phase: "adaptation", week: 1, weekInPhase: 1 };
  }
  const start = new Date(userProfile.trainingCycle.startDate + "T12:00:00");
  const now = new Date();
  const weeksSince = Math.floor((now - start) / (1000 * 60 * 60 * 24 * 7));
  const weekInCycle = (weeksSince % 8) + 1;

  let phase;
  if (weekInCycle <= 2) phase = "adaptation";
  else if (weekInCycle <= 5) phase = "accumulation";
  else if (weekInCycle <= 7) phase = "intensification";
  else phase = "deload";

  return { phase, week: weekInCycle, weekInCycle };
}

function getMachineProgressionStatus() {
  const status = {};
  MACHINES.forEach(machine => {
    if (machine === "Cardio") return;
    const history = getMachineHistory(machine);
    if (history.length < 3) { status[machine] = "insufficient_data"; return; }
    const last3 = history.slice(-3);
    const weights = last3.map(h => h.maxWeight);
    const isProgressing = weights[2] > weights[0];
    const isPlateaued = weights[0] === weights[1] && weights[1] === weights[2];
    const isRegressing = weights[2] < weights[0];
    status[machine] = isPlateaued ? "plateau"
      : isRegressing ? "regressing"
      : isProgressing ? "progressing" : "stable";
  });
  return status;
}

function calculateFatigue() {
  const last7days = new Date();
  last7days.setDate(last7days.getDate() - 7);
  const cutoff = last7days.toISOString().slice(0, 10);
  const recentSessions = sessions.filter(s => s.date >= cutoff);
  const count = recentSessions.length;
  const totalMins = recentSessions.reduce((a, s) => a + (parseFloat(s.duration) || 0), 0);

  if (count >= 5 || totalMins >= 250) return "overreached";
  if (count >= 4 || totalMins >= 200) return "accumulated";
  if (count >= 2) return "normal";
  return "rested";
}

function getPosturalRisk() {
  const pp = getPushPullRatio();
  if (pp.status === "sin_datos") return "sin_datos";
  if (pp.ratio !== null && pp.ratio < 1) return "alert";
  if (pp.status === "warning") return "warning";
  return "ok";
}

function analyzeCurrentState() {
  return {
    fatigue: calculateFatigue(),
    muscleDebt: getMuscleDebt(),
    pushPullRatio: getPushPullRatio(),
    cyclePhase: getCyclePhase(),
    progressionStatus: getMachineProgressionStatus(),
    posturalRisk: getPosturalRisk()
  };
}

          const v=parseFloat(fixDecimal(set.value))||0;

}

function getDeltaHtml(val, prev, unit="", lowerIsBetter=false){
  if(prev===null || prev===undefined || prev===0 && val===0) return `<span class="mc-delta neutral">—</span>`;
  const diff = val - prev;
  const pct = prev !== 0 ? Math.round((diff/Math.abs(prev))*100) : null;
  const label = pct !== null ? (diff>=0?"+":"")+pct+"%" : (diff>=0?"+":"")+roundPt(diff)+unit;
  if(diff === 0) return `<span class="mc-delta neutral">= sin cambio</span>`;
  const isGood = lowerIsBetter ? diff < 0 : diff > 0;
  return `<span class="mc-delta ${isGood?'up':'down'}">${label}</span>`;
}

  const phaseLabel = {
    adaptation: "adaptación (semana 1-2): pesos moderados, técnica prioritaria",
    accumulation: "acumulación (semana 3-5): máximo volumen",
    intensification: "intensificación (semana 6-7): menos series, más peso",
    deload: "descarga (semana 8): 60% del volumen habitual"
  }[cycle.phase];

  const muscleDebtText = Object.entries(state.muscleDebt)
    .filter(([, d]) => d < 999)
    .sort((a, b) => b[1] - a[1])

    .map(([m, s]) => `${m}: ${s}`)
    .join(", ");

  const prs = {};
  MACHINES.forEach(m => {
    const pr = getPRForMachine(m);
    if (pr) prs[m] = `${pr.weight}kg × ${pr.reps} reps`;

  const priorities = Object.entries(aiMusclePriorities)
    .filter(([, p]) => p !== "none")
    .map(([m, p]) => `${m}: ${p}`)
    .join(", ") || "sin preferencias adicionales";

  const goalLabel = {
    maintain: "mantener media actual",
    beat: "superar media en un 10-15%",
    max: "intentar récord personal (con precaución)"
  }[aiGoalMode];

  const machineInfo = Object.entries(MACHINE_DATABASE)
    .filter(([name]) => MACHINES.includes(name))
    .map(([name, db]) => `${name}: tipo=${db.type}, músculos=${db.primaryMuscles.join('+')}, escoliosis=${db.scoliosisBenefit}, técnica="${db.techniqueKey}"`)
    .join("\n");

  const prompt = `Eres entrenador personal especializado en escoliosis dorsal y principiantes. Genera una sesión personalizada.

PERFIL DEL USUARIO:
- 24 años, 54.5kg, 169cm, IMC 19.1, objetivo 60kg (ganar músculo)
- Escoliosis dorsal leve: hombro izquierdo más bajo, desequilibrio escapular
- Nivel: principiante absoluto (5 sesiones totales)
- Objetivos por orden: ganar músculo > mejorar postura > fuerza > resistencia
- Sesiones: 3/semana de 50 min
- Codos en adaptación: evitar sobrecargar flexores

ESTADO HOY:
- Fatiga: ${fatigueLabel}
- Fase del ciclo de entrenamiento: ${phaseLabel}
- Días desde último trabajo por músculo: ${muscleDebtText || "sin datos"}
- Progresión por máquina: ${progressionText || "sin datos"}
- Ratio tirón/empuje últimas 2 semanas: ${state.pushPullRatio.ratio || "sin datos"} (objetivo: 2:1)
- Preferencias adicionales del usuario: ${priorities}
- Objetivo de la sesión: ${goalLabel}

RÉCORDS ACTUALES:
${Object.entries(prs).map(([m, v]) => `- ${m}: ${v}`).join("\n") || "Sin récords aún"}

MÁQUINAS DISPONIBLES:
${machineInfo}

REGLAS OBLIGATORIAS:
1. Ratio tirón/empuje mínimo 2:1 en esta sesión (escoliosis)
2. Si fatiga es "alta", reducir series totales un 30%
3. Si fase es "deload", reducir todo al 60%
4. Si una máquina está en "plateau", cambiar rango de reps o series
5. Incluir siempre al menos Low Row o Pull Down (prioritarias para escoliosis)
6. Máximo 6 ejercicios en 50 minutos
7. Para principiante: priorizar consistencia sobre intensidad máxima

Responde ÚNICAMENTE con JSON válido, sin texto antes ni después, sin markdown:
{
  "title": "nombre de la sesión",
  "summary": "descripción del objetivo en 1 frase",
  "coachTip": "consejo técnico específico para escoliosis dorsal, personalizado",
  "estimatedMinutes": 50,
  "exercises": [
    {
      "machine": "nombre exacto de la lista",
      "isCardio": false,
      "sets": 3,
      "reps": 10,
      "weight": 25,
      "note": "por qué este ejercicio hoy y qué vigilar",
      "pts": 750
    }
  ],
  "totalPts": 4500,
  "postureNote": "observación específica sobre postura y escoliosis para esta sesión"
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1200,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.find(c => c.type === "text")?.text || "";
    const clean = text.replace(/```json|```/g, "").trim();

function useSuggestionAsSession(){
  if(!aiSuggestion || !aiSuggestion.exercises) return;
  const today = new Date().toISOString().slice(0,10);
  const newSession = {
    id: Date.now(), date: today, duration: 60,
    goal: Math.round(aiSuggestion.totalPts * 0.95),
    effort: 5, notes: `Sesión generada: ${aiSuggestion.title}`, exercises: []
  };
  aiSuggestion.exercises.forEach(ex => {
    const sets = [];
    if(ex.isCardio){
      const minMatch = ex.cardioDetail?.match(/(\d+)\s*min/);
      const mins = minMatch ? minMatch[1] : "20";
      sets.push({isCardio:true, value:mins, unit:"min"});
    } else {
      for(let i=0;i<(ex.sets||3);i++){
        sets.push({isCardio:false, weight:String(ex.weight||""), reps:String(ex.reps||"")});
      }
    }
    newSession.exercises.push({ machine: ex.machine, sets });
  });
  MACHINES.forEach(m=>{
    if(!newSession.exercises.find(e=>e.machine===m)){
      newSession.exercises.push({machine:m, sets:[m==="Cardio"?{isCardio:true,value:"",unit:"min"}:{isCardio:false,weight:"",reps:""}]});
    }
  });
  editingSession = newSession;
  activeRoutineId = null; currentView = "form";
  aiSuggestion = null; render();
  showToast("✅ Sesión cargada en el formulario");
}

  // Récords batidos por máquina

  session.exercises.forEach(ex => {
    if (ex.machine === "Cardio") return;
    const oldPR = getPRForMachine(ex.machine);
    const oldScore = oldPR ? oldPR.weight * oldPR.reps : 0;
    const currentBest = ex.sets
      .filter(s => !s.isCardio && (parseFloat(fixDecimal(s.weight)) || 0) > 0)
      .reduce((max, s) => {
        const score = (parseFloat(fixDecimal(s.weight)) || 0) * (parseFloat(fixDecimal(s.reps)) || 0);
        return score > max ? score : max;
      }, 0);
    if (currentBest > oldScore) {
      const bestSet = ex.sets
        .filter(s => !s.isCardio)
        .sort((a, b) =>
          (parseFloat(fixDecimal(b.weight)) || 0) * (parseFloat(fixDecimal(b.reps)) || 0) -

  const prsHtml = newPRs.length

        ${newPRs.map(pr => `<div style="background:#f5f3ff;border-radius:8px;padding:6px 10px;margin-bottom:4px;font-size:12px;font-weight:700;color:#7c3aed">✓ ${pr}</div>`).join("")}
      </div>`
    : "";

  const html = `<div class="modal-overlay"><div class="modal-sheet" style="text-align:center">
    <div style="background:${headerBg};border-radius:14px;padding:18px;margin-bottom:16px">
      <div style="font-size:22px;font-weight:900;color:${headerColor}">${headline}</div>
      <div style="font-size:38px;font-weight:900;margin:8px 0;color:${headerColor}">${sc} pts</div>
      <div style="font-size:13px;font-weight:700;color:${headerColor}">
        ${vsPct >= 0 ? "+" : ""}${vsPct}% vs tu media (${avg} pts)
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      <div style="background:#f8fafc;border-radius:12px;padding:12px 8px">

        <div style="font-size:10px;font-weight:700;color:#64748b">minutos</div>
      </div>
      <div style="background:#f8fafc;border-radius:12px;padding:12px 8px">

        <div style="font-size:10px;font-weight:700;color:#64748b">series</div>

// ==================== CALENDAR ====================
function renderCalendar(){
  const avgScore=getAverageScore(); const sessMap={};
  sessions.forEach(s=>{ const sc=sessionScore(s); if(!sessMap[s.date]) sessMap[s.date]={score:0}; sessMap[s.date].score+=sc; });
  const todayStr=new Date().toISOString().slice(0,10);
  const first=new Date(calYear,calMonth,1).getDay(); const days=new Date(calYear,calMonth+1,0).getDate(); const offset=(first+6)%7;
  let cells=""; ["L","M","X","J","V","S","D"].forEach(d=>cells+=`<div class="cal-day-hdr">${d}</div>`);
  for(let i=0;i<offset;i++) cells+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const key=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const data=sessMap[key]; const isPlanned=plannedDays.includes(key); const isToday=key===todayStr;
    let dotClass=""; if(data){ if(data.score>avgScore) dotClass="gold"; else if(Math.abs(data.score-avgScore)<0.1) dotClass="silver"; else dotClass="red"; }
    const plannedClass=isPlanned&&!data?"planned":"";
    cells+=`<div class="cal-day ${data?"has-session":""} ${isToday?"today":""} ${plannedClass}" onclick="${data?`calClick('${key}')`:`togglePlannedDay('${key}')`}"><div class="day-num">${d}</div>${data?`<div class="cal-dot ${dotClass}"></div>`:isPlanned?`<div style="font-size:10px">📅</div>`:""}</div>`;
  }
  return `<div class="cal-wrap"><div class="cal-nav"><button onclick="calPrev()">‹</button><span>${MONTHS[calMonth]} ${calYear}</span><button onclick="calNext()">›</button></div><div class="cal-grid">${cells}</div><div style="display:flex;gap:12px;justify-content:center;margin-top:12px;font-size:10px;font-weight:700"><span>🟡 Supera media</span><span>⚪ Iguala</span><span>🔴 Debajo</span><span>📅 Planeado</span></div></div>`;
}

function getMachineAvgScore(machineName){
  let total = 0, count = 0;
  sessions.forEach(s => {
    const ex = s.exercises.find(e => e.machine === machineName);
    if(ex){
      const sc = calcScore(ex.sets);
      if(sc > 0){ total += sc; count++; }
    }
  });
  return count > 0 ? roundPt(total / count) : 0;
}

        <div class="svc-meta-val">${session.duration || "—"}</div>
        <div class="svc-meta-lbl">minutos</div>
      </div>
      <div class="svc-meta-item">
        <div class="svc-meta-val">${usedExercises.length}</div>
        <div class="svc-meta-lbl">ejercicios</div>
      </div>
      ${effortHtml}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;background:rgba(255,255,255,0.05);border-radius:12px;padding:10px;">
      <div style="text-align:center"><div style="font-size:18px;font-weight:900">${totals.totalSets}</div><div style="font-size:9px;opacity:0.7">Series</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:900">${totals.totalReps}</div><div style="font-size:9px;opacity:0.7">Repeticiones</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:900">${totals.totalVolumeKg}</div><div style="font-size:9px;opacity:0.7">kg totales</div></div>
    </div>
    ${goal > 0 ? `
    <div class="svc-goal-bar-wrap">
      <div class="svc-goal-bar-labels">
        <span>Objetivo: ${goal} pts</span>
        <span>${pct}% completado</span>
      </div>
      <div class="svc-goal-bar-bg">
        <div class="svc-goal-bar-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
    </div>` : ""}
    <hr class="svc-divider">
    <div class="svc-machines-title">Ejercicios · comparativa vs media personal</div>
    ${machineRowsHtml}
    <div class="svc-footer">Generado con Train-tracker</div>
  </div>`;

  const wrapper = document.createElement("div");
  wrapper.innerHTML = cardHtml;
  document.body.appendChild(wrapper);

  const cardEl = document.getElementById("__share_render__");

  try {
    await new Promise(r => setTimeout(r, 80));
    const canvas = await html2canvas(cardEl, {
      scale: 2.5,
      backgroundColor: null,
      logging: false,
      useCORS: false,
      allowTaint: true
    });
    document.body.removeChild(wrapper);

    const imageUrl = canvas.toDataURL('image/png');
    try {
      const blob = await (await fetch(imageUrl)).blob();
      const file = new File([blob], `entreno_${session.date}.png`, { type: 'image/png' });
      if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file], title: `Entreno ${dateLabel}`, text: `${sc} pts · ${DAYS_ES[d.getDay()]}` });
        showToast("✅ Imagen compartida");
        return;
      }
    } catch(e){}

    const link = document.createElement('a');
    link.download = `entreno_${session.date}_train-tracker.png`;
    link.href = imageUrl;
    link.click();
    showToast("✅ Imagen guardada");
  } catch(err){
    console.error(err);
    document.body.removeChild(wrapper);
    showToast("Error al generar la imagen", true);
  }
}

// ==================== SESSION CARDS ====================
function renderSessionCard(s){

  const d=new Date(s.date+"T12:00:00"); const dateLabel=`${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
  const effort=s.effort||null; let effortHtml="";
  if(effort){ const ec=getEffortColor(effort); effortHtml=`<div class="effort-badge" style="background:${ec.bg};color:${ec.color}">💪 Esfuerzo: ${effort}/10</div>`; }
  
  const totals = getSessionTotals(s);
  
  const exercisesHtml=s.exercises.map(ex=>{ const exSc=roundPt(calcScore(ex.sets)); const chips=ex.sets.map(st=>st.isCardio?`<span class="set-chip">${fixDecimal(st.value)||0} ${st.unit}</span>`:`<span class="set-chip">${fixDecimal(st.weight)||0}kg × ${fixDecimal(st.reps)||0}</span>`).join(""); return `<div style="margin-bottom:9px"><div style="font-weight:800;font-size:12px;margin-bottom:4px">${ex.machine} → ${exSc} pts</div>${chips}</div>`; }).join("");

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div><div style="font-weight:800;font-size:15px">${dateLabel} <span style="font-size:11px;opacity:0.7">${DAYS_ES[d.getDay()]}</span></div><div style="font-size:11px;margin-top:3px;font-weight:600">⏱ ${s.duration} min · 🎯 ${s.goal} pts</div>${effortHtml}</div>${badgeHtml(sc,s.goal)}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;background:#f8fafc;border-radius:10px;padding:8px;">
      <div style="text-align:center"><div style="font-weight:900;font-size:14px">${totals.totalSets}</div><div style="font-size:9px;color:#64748b">Series</div></div>
      <div style="text-align:center"><div style="font-weight:900;font-size:14px">${totals.totalReps}</div><div style="font-size:9px;color:#64748b">Repeticiones</div></div>
      <div style="text-align:center"><div style="font-weight:900;font-size:14px">${totals.totalVolumeKg}</div><div style="font-size:9px;color:#64748b">kg totales</div></div>
    </div>

      <button onclick="deleteSession(${s.id})" style="background:#fef2f2;color:#dc2626;border:none;border-radius:10px;padding:10px 14px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer">🗑</button>
      <button onclick="shareSessionAsImage(${s.id})" class="btn-share-card" style="background:#dcfce7;border:none;border-radius:10px;padding:10px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:#15803d">📸 Compartir</button>

function deleteSession(id){ if(confirm("¿Eliminar?")){ sessions=sessions.filter(s=>s.id!==id); saveAll(); render(); } }

function showNew(){
  if(sessions.length > 0){ showTemplateModal(); } else { startBlankSession(); }
}

function startBlankSession(){
  editingSession={id:Date.now(),date:new Date().toISOString().slice(0,10),duration:45,goal:Math.round(getAverageScore()),effort:5,exercises:MACHINES.map(m=>({machine:m,sets:[m==="Cardio"?{isCardio:true,value:"",unit:"min"}:{isCardio:false,weight:"",reps:""}]})),notes:""};
  activeRoutineId=null; currentView="form"; closeModal(); render();
}

function showTemplateModal(){
  const recent = [...sessions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const itemsHtml = recent.map(s => {
    const sc = roundPt(sessionScore(s));
    const d = new Date(s.date+"T12:00:00");
    const dateLabel = `${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)} · ${DAYS_ES[d.getDay()]}`;
    const machineList = s.exercises.filter(ex => ex.sets.some(st => !st.isCardio ? (parseFloat(fixDecimal(st.weight))||0)>0 : (parseFloat(fixDecimal(st.value))||0)>0)).map(ex=>ex.machine).join(", ");
    return `<div class="template-item" onclick="useTemplate(${s.id})">
      <div class="t-date">📋 ${dateLabel}</div>
      <div class="t-machines">${machineList||"Sin datos"}</div>
      <div class="t-pts">${sc} pts · ${s.duration} min · Esfuerzo ${s.effort||"—"}/10</div>
    </div>`;
  }).join("");
  const html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
    <div class="modal-title">➕ Nuevo entreno<button class="modal-close" onclick="closeModal()">×</button></div>
    <button class="btn-modal-primary" style="margin-top:0;margin-bottom:14px;background:#2563eb" onclick="startBlankSession()">🆕 Entreno en blanco</button>
    <div class="modal-label" style="margin-bottom:8px">O COPIA UNA SESIÓN ANTERIOR</div>
    ${itemsHtml}
  </div></div>`;
  document.getElementById("modal-container").innerHTML = html;
}

function useTemplate(sessionId){
  const original = sessions.find(s => s.id === sessionId);
  if(!original) return;
  editingSession = JSON.parse(JSON.stringify(original));
  editingSession.id = Date.now();
  editingSession.date = new Date().toISOString().slice(0,10);
  editingSession.goal = Math.round(getAverageScore());
  editingSession.notes = "";
  MACHINES.forEach(m => {
    if(!editingSession.exercises.find(e=>e.machine===m)){
      editingSession.exercises.push({machine:m, sets:[m==="Cardio"?{isCardio:true,value:"",unit:"min"}:{isCardio:false,weight:"",reps:""}]});
    }
  });
  activeRoutineId = null; currentView = "form"; closeModal(); render();
  showToast("Plantilla cargada ✅");
}

function cancelForm(){ 
  stopChrono();
  editingSession=null; activeRoutineId=null; showView("home"); 
}

  </div>
${renderPosturalDashboard()}

  ${renderWeeklyVolumePanel()}

  ${streakHtml}
  ${routineTodayHtml}

  <!-- Meta semanal -->
  <div class="goal-meter">
    <div class="goal-meter-header"><span>🎯 Meta semanal: 3 días</span><span>${daysTrained}/3</span></div>
    <div class="goal-meter-bar"><div class="goal-meter-fill" style="width:${goalPercent}%;background:${goalMet?'#16a34a':'#d97706'}"></div></div>
    <div class="goal-meter-header"><span>⏱ Tiempo semana</span><span>${totalMinutes} min</span></div>
    ${comparison.hasPrev?`<div style="margin-top:8px;text-align:center;font-size:12px;font-weight:700">vs semana pasada ${comparison.diff>0?`<span class="trend-up">▲ +${comparison.diff} pts</span>`:comparison.diff<0?`<span class="trend-down">▼ ${comparison.diff} pts</span>`:"= Sin cambios"}</div>`:""}

function startWithRoutine(routineId){
  startBlankSession();
